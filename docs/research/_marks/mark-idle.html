<!doctype html><html lang="en"><head><meta charset="utf-8"><title>The Tower — canonical idle</title>
<style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .keystone{width:min(64vmin,280px);height:auto;display:block}
  /* Idle (Breathe): the cream light swells in place, silhouette-stable.
     Animate VALUE + scaleY from the base only — never the gold outline.
     Opacity floor kept high so the cream stays WARM (low alpha grays out on navy). */
  .ks-light{
    transform-box:fill-box; transform-origin:50% 100%;
    animation:ks-breathe 7s cubic-bezier(.45,0,.55,1) infinite;
  }
  @keyframes ks-breathe{
    0%,100%{opacity:.62; transform:scaleY(.92)}
    50%    {opacity:1;   transform:scaleY(1)}
  }
  @media (prefers-reduced-motion:reduce){
    .ks-light{animation:none; opacity:.85; transform:none}
  }
</style></head><body>
<svg class="keystone" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kt kd">
  <title id="kt">The Tower</title>
  <desc id="kd">A gold Art-Deco tower with a keystone cornice and a warm light breathing in its archway.</desc>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <path fill="#C9A84C" fill-rule="evenodd" d="M45 96 L45 39 L40 39 L40 30 Q40 28.5 41.5 28.5 L78.5 28.5 Q80 28.5 80 30 L80 39 L75 39 L75 96 L66.5 96 L66.5 67 Q66.5 57 60 57 Q53.5 57 53.5 67 L53.5 96 Z"/>
  <path class="ks-light" fill="#F5F1E8" d="M60 60 Q65 60.5 65 69 L65 96 L55 96 L55 69 Q55 60.5 60 60 Z"/>
</svg>
</body></html>
