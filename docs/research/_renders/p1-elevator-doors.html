<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;height:100%;background:#0d0d18;display:grid;place-items:center}
.a{width:240px;height:240px}
@keyframes breathe{0%,100%{opacity:.74}50%{opacity:1}}
@keyframes glow{0%,100%{opacity:.16}50%{opacity:.5}}
.sliver{animation:breathe 9s ease-in-out infinite}
.halo{animation:glow 9s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){.sliver,.halo{animation:none}.sliver{opacity:.92}.halo{opacity:.3}}
</style></head><body>
<svg class="a" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="The Arrival">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D7B95F"/><stop offset="1" stop-color="#BE9C42"/>
    </linearGradient>
    <radialGradient id="h" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F5F1E8"/><stop offset="1" stop-color="#F5F1E8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <ellipse class="halo" cx="60" cy="60" rx="11" ry="46" fill="url(#h)"/>
  <path d="M28 96 L28 42 Q28 26 44 26 L57 26 L57 96 Q57 98 55 98 L30 98 Q28 98 28 96 Z" fill="url(#g)"/>
  <path d="M92 96 L92 42 Q92 26 76 26 L63 26 L63 96 Q63 98 65 98 L90 98 Q92 98 92 96 Z" fill="url(#g)"/>
  <path class="sliver" d="M58.5 17 Q60 14 61.5 17 L61.5 100 Q60 102 58.5 100 Z" fill="#F5F1E8"/>
</svg>
</body></html>
