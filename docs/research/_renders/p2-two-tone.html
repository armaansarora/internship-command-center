<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Keystone — Tone-on-Tone</title>
<style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .mark{width:280px;height:280px}
  .soul{transform-box:fill-box;transform-origin:60px 80px;animation:breathe 8s ease-in-out infinite}
  @keyframes breathe{
    0%,100%{opacity:.78;transform:scale(.94)}
    50%{opacity:1;transform:scale(1.06)}
  }
  @media (prefers-reduced-motion:reduce){.soul{animation:none;opacity:.92;transform:none}}
</style></head>
<body>
<svg class="mark" viewBox="0 0 120 120" role="img" aria-label="The Tower keystone, light breathing in the passage">
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <defs>
    <linearGradient id="face" x1="60" y1="28" x2="60" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24243F"/><stop offset="1" stop-color="#15152A"/>
    </linearGradient>
    <radialGradient id="soul" cx="60" cy="80" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5EAC2"/>
      <stop offset=".35" stop-color="#E8CE7E" stop-opacity=".85"/>
      <stop offset=".75" stop-color="#C9A84C" stop-opacity=".22"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pass"><path d="M50 92.5 L50 73 C50 63 54.5 56 60 53 C65.5 56 70 63 70 73 L70 92.5 Z"/></clipPath>
  </defs>
  <path d="M44 30 A4 4 0 0 1 48 26 L72 26 A4 4 0 0 1 76 30 L86 88 A4 4 0 0 1 82 92.5 L38 92.5 A4 4 0 0 1 34 88 Z" fill="url(#face)" stroke="#C9A84C" stroke-width="1.4" stroke-linejoin="round"/>
  <g clip-path="url(#pass)">
    <rect class="soul" x="40" y="48" width="40" height="48" fill="url(#soul)"/>
  </g>
  <path d="M50 92.5 L50 73 C50 63 54.5 56 60 53 C65.5 56 70 63 70 73 L70 92.5" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
</body></html>
