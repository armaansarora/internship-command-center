<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Ascent</title>
<style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .wrap{width:300px;height:300px}
  svg{width:100%;height:100%;display:block}
  .band{transform-box:fill-box;transform-origin:center;animation:rise 9s cubic-bezier(.45,0,.55,1) infinite;will-change:transform,opacity}
  .bloom{transform-box:fill-box;transform-origin:center;animation:glow 9s ease-in-out infinite;will-change:opacity,transform}
  @keyframes rise{
    0%{transform:translateY(11px) scaleY(.86);opacity:.35}
    42%{transform:translateY(0) scaleY(1);opacity:1}
    58%{transform:translateY(0) scaleY(1);opacity:1}
    100%{transform:translateY(11px) scaleY(.86);opacity:.35}
  }
  @keyframes glow{0%,100%{opacity:.10;transform:scale(.9)}50%{opacity:.34;transform:scale(1.18)}}
  @media (prefers-reduced-motion:reduce){.band{animation:none;transform:none;opacity:1}.bloom{animation:none;opacity:.22}}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 120 120" role="img" aria-label="The Ascent — a luminous shaft rising to an apex">
<defs>
<linearGradient id="g" x1="60" y1="16" x2="60" y2="104" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#DCC278"/><stop offset="1" stop-color="#B5943A"/>
</linearGradient>
<radialGradient id="b" cx="50%" cy="50%" r="50%">
<stop offset="0" stop-color="#FBEFC4"/><stop offset="1" stop-color="#FBEFC4" stop-opacity="0"/>
</radialGradient>
</defs>
<rect width="120" height="120" rx="26" fill="#1A1A2E"/>
<path fill="url(#g)" fill-rule="evenodd" d="M54 16.5h12a6 6 0 0 1 4.4 1.9L80.7 30a8 8 0 0 1 2.1 5.4V95a8 8 0 0 1-8 8H45.2a8 8 0 0 1-8-8V35.4A8 8 0 0 1 39.3 30L49.6 18.4A6 6 0 0 1 54 16.5Zm6 16.5a7.5 7.5 0 0 0-7.5 7.5v40a7.5 7.5 0 0 0 15 0V40.5A7.5 7.5 0 0 0 60 33Z"/>
<ellipse class="bloom" cx="60" cy="64.5" rx="15" ry="20" fill="url(#b)"/>
<rect class="band" x="54.8" y="52" width="10.4" height="25" rx="5.2" fill="#F4E7BA"/>
</svg>
</div>
</body>
</html>
