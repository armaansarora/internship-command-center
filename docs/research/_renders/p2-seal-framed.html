<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seal-Framed Keystone</title><style>
  html,body{margin:0;height:100%;display:grid;place-items:center;background:#0f0f1c}
  .stage{width:min(64vmin,360px);aspect-ratio:1}
  svg{width:100%;height:100%;display:block}
  .glow{transform-origin:60px 76px;animation:breathe 8s ease-in-out infinite}
  .halo{transform-origin:60px 86px;animation:halo 8s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.78;transform:scaleY(.96)}50%{opacity:1;transform:scaleY(1.05)}}
  @keyframes halo{0%,100%{opacity:.7;transform:scale(.94)}50%{opacity:1;transform:scale(1.06)}}
  @media(prefers-reduced-motion:reduce){.glow,.halo{animation:none;opacity:1;transform:none}}
</style></head><body>
<div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="The Tower keystone in a satin-gold seal ring, warm light breathing up the passage">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8BD6A"/><stop offset="0.5" stop-color="#C9A84C"/><stop offset="1" stop-color="#A8862F"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4CC7E"/><stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.86" r="0.5">
      <stop offset="0" stop-color="#FFE9B8"/><stop offset="0.55" stop-color="#F5F1E8"/><stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <circle cx="60" cy="60" r="40.5" fill="none" stroke="url(#ring)" stroke-width="3.2"/>
  <circle cx="60" cy="60" r="35" fill="none" stroke="#A8862F" stroke-width="0.8" opacity="0.55"/>
  <ellipse class="halo" cx="60" cy="86" rx="13" ry="15" fill="url(#glow)"/>
  <path d="M44.5 78 L48 44 Q48.2 41.4 50.8 41.3 L69.2 41.3 Q71.8 41.4 72 44 L75.5 78 Z" fill="url(#cap)"/>
  <path d="M60 60.5 Q53.5 62 53.5 70.5 L53.5 78 L66.5 78 L66.5 70.5 Q66.5 62 60 60.5 Z" fill="#1A1A2E"/>
  <path class="glow" d="M60 63 Q55.6 64.2 55.6 71 L55.6 76 L64.4 76 L64.4 71 Q64.4 64.2 60 63 Z" fill="url(#glow)"/>
</svg>
</div>
</body></html>
