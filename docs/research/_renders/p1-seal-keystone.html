<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Seal</title>
<style>
  :root{color-scheme:dark}
  html,body{margin:0;height:100%;background:#15151f;display:flex;align-items:center;justify-content:center}
  .seal{width:240px;height:240px}
  @keyframes sealDoor{0%,100%{opacity:.32}50%{opacity:1}}
  @keyframes sealHalo{0%,100%{opacity:.10}50%{opacity:.40}}
  @keyframes sealRing{0%,100%{opacity:.9}50%{opacity:1}}
  .door{animation:sealDoor 9s ease-in-out infinite}
  .halo{animation:sealHalo 9s ease-in-out infinite}
  .ring{animation:sealRing 9s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){
    .door{animation:none;opacity:.7}.halo{animation:none;opacity:.22}.ring{animation:none;opacity:1}
  }
</style></head>
<body>
<svg class="seal" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Seal">
  <defs>
    <linearGradient id="sg" x1="60" y1="22" x2="60" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8BC6A"/><stop offset="1" stop-color="#C5A446"/>
    </linearGradient>
    <linearGradient id="dg" x1="60" y1="59" x2="60" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBE7B0"/><stop offset="1" stop-color="#E9C873"/>
    </linearGradient>
    <radialGradient id="hg" cx="60" cy="66" r="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBE7B0"/><stop offset="1" stop-color="#FBE7B0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <clipPath id="disc"><circle cx="60" cy="60" r="24.5"/></clipPath>
  <g clip-path="url(#disc)">
    <circle class="halo" cx="60" cy="66" r="13" fill="url(#hg)"/>
  </g>
  <g class="ring">
  <path fill="url(#sg)" fill-rule="evenodd"
    d="M60 25.5 A34.5 34.5 0 1 1 60 94.5 A34.5 34.5 0 1 1 60 25.5 Z
       M60 35.5 A24.5 24.5 0 1 0 60 84.5 A24.5 24.5 0 1 0 60 35.5 Z"/>
  <path fill="url(#sg)"
    d="M53.0 46.8 C53.2 45.6 54.2 44.7 55.4 44.7 L64.6 44.7
       C65.8 44.7 66.8 45.6 67.0 46.8 L71.6 69.8
       C72.0 71.8 70.5 73.7 68.4 73.7 L51.6 73.7
       C49.5 73.7 48.0 71.8 48.4 69.8 Z"/>
  <path fill="#1A1A2E"
    d="M55.6 73.7 L55.6 63.7 C55.6 61.3 57.6 59.3 60 59.3
       C62.4 59.3 64.4 61.3 64.4 63.7 L64.4 73.7 Z"/>
  </g>
  <path class="door" fill="url(#dg)"
    d="M56.9 73.7 L56.9 63.9 C56.9 62.2 58.3 60.7 60 60.7
       C61.7 60.7 63.1 62.2 63.1 63.9 L63.1 73.7 Z"/>
</svg>
</body></html>
