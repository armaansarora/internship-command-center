<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lodestar</title>
<style>
  html,body{margin:0;height:100%;background:#0F0F1C;display:grid;place-items:center}
  .stage{width:min(72vmin,420px);aspect-ratio:1}
  @media (prefers-reduced-motion:reduce){
    #glint,#halo{animation:none!important}
  }
  /* breathe value/glow only — silhouette never moves */
  #glint{transform-origin:60px 33px;animation:breathe 9s ease-in-out infinite}
  #halo{transform-origin:60px 33px;animation:halo 9s ease-in-out infinite}
  @keyframes breathe{
    0%,100%{opacity:.86}
    50%{opacity:1}
  }
  @keyframes halo{
    0%,100%{opacity:.10;transform:scale(.9)}
    50%{opacity:.32;transform:scale(1.12)}
  }
</style>
</head>
<body>
<div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" role="img" aria-label="The Lodestar, idle">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4B86A"/>
      <stop offset="1" stop-color="#BE9D44"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8D08A"/>
      <stop offset="100%" stop-color="#E8D08A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <circle id="halo" cx="60" cy="33" r="26" fill="url(#rg)"/>
  <path d="M56.4 92 L60 47 L63.6 92 Z" fill="url(#g)"/>
  <rect x="46" y="92" width="28" height="5" rx="2.5" fill="url(#g)"/>
  <path id="glint" d="M60 12
           C61.2 26 62.6 31.6 72 33.2
           C62.6 34.8 61.2 40.4 60 54
           C58.8 40.4 57.4 34.8 48 33.2
           C57.4 31.6 58.8 26 60 12 Z" fill="url(#g)"/>
</svg>
</div>
</body>
</html>
