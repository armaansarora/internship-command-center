<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .stage{width:240px;height:240px}
  @media (prefers-reduced-motion:reduce){.band,.glow,.f1,.f2,.base{animation:none!important}}
  .band{animation:breathe 9s ease-in-out infinite}
  .glow{animation:halo 9s ease-in-out infinite}
  .f2{animation:lift 9s ease-in-out infinite}
  .f1{animation:lift 9s ease-in-out infinite .9s}
  .base{animation:lift 9s ease-in-out infinite 1.8s}
  @keyframes breathe{0%,100%{opacity:.86}45%{opacity:1}}
  @keyframes halo{0%,100%{opacity:.18}45%{opacity:.42}}
  @keyframes lift{0%,100%{opacity:.78}40%{opacity:.96}}
</style></head><body>
<svg class="stage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="g" x1="0" y1="92" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9A84C" stop-opacity=".72"/><stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
    <radialGradient id="h" cx="60" cy="31" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0D98A"/><stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#1A1A2E"/>
  <ellipse class="glow" cx="60" cy="31" rx="40" ry="13" fill="url(#h)"/>
  <g fill-rule="evenodd">
    <path class="base" fill="url(#g)" d="M37 80h46a5 5 0 0 1 5 5v7H32v-7a5 5 0 0 1 5-5zM53 86v6h14v-6a3 3 0 0 0-3-3h-8a3 3 0 0 0-3 3z"/>
    <rect class="f1" x="32" y="63" width="56" height="9" rx="4.5" fill="url(#g)"/>
    <rect class="f2" x="32" y="46" width="56" height="9" rx="4.5" fill="url(#g)"/>
  </g>
  <rect class="band" x="34" y="26" width="52" height="10" rx="5" fill="#C9A84C"/>
</svg></body></html>
