<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#0e0e1c;display:grid;place-items:center}
  .apex-wrap{width:160px;height:160px}
  @keyframes ax-rise{0%,100%{transform:translateY(6%);opacity:0}45%{opacity:.9}55%{opacity:.9}}
  @keyframes ax-breath{0%,100%{opacity:.32}50%{opacity:.62}}
  .ax-sweep{animation:ax-rise 9s ease-in-out infinite}
  .ax-glow{animation:ax-breath 7s ease-in-out infinite;transform-origin:60px 30px}
  @media (prefers-reduced-motion:reduce){.ax-sweep,.ax-glow{animation:none}.ax-glow{opacity:.45}}
</style></head><body>
<div class="apex-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" role="img" aria-label="The Apex">
  <defs>
    <linearGradient id="ax" x1="60" y1="22" x2="60" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBC06D"/><stop offset="1" stop-color="#BB9A3F"/>
    </linearGradient>
    <linearGradient id="axShine" x1="60" y1="98" x2="60" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4D2" stop-opacity="0"/>
      <stop offset=".5" stop-color="#FFF4D2" stop-opacity=".85"/>
      <stop offset="1" stop-color="#FFF4D2" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="axTip" cx="60" cy="30" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4D2"/><stop offset="1" stop-color="#FFF4D2" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="axClip"><path d="M60 23.5 C61.9 23.5 63.6 24.6 64.5 26.3 L93.7 81.2 C95 83.6 93.2 86.5 90.5 86.5 L74.6 86.5 C73 86.5 71.5 85.6 70.8 84.1 L61 64.6 C60.6 63.8 59.4 63.8 59 64.6 L49.2 84.1 C48.5 85.6 47 86.5 45.4 86.5 L29.5 86.5 C26.8 86.5 25 83.6 26.3 81.2 L55.5 26.3 C56.4 24.6 58.1 23.5 60 23.5 Z"/></clipPath>
  </defs>
  <rect width="120" height="120" rx="27" fill="#1A1A2E"/>
  <path d="M60 23.5 C61.9 23.5 63.6 24.6 64.5 26.3 L93.7 81.2 C95 83.6 93.2 86.5 90.5 86.5 L74.6 86.5 C73 86.5 71.5 85.6 70.8 84.1 L61 64.6 C60.6 63.8 59.4 63.8 59 64.6 L49.2 84.1 C48.5 85.6 47 86.5 45.4 86.5 L29.5 86.5 C26.8 86.5 25 83.6 26.3 81.2 L55.5 26.3 C56.4 24.6 58.1 23.5 60 23.5 Z" fill="url(#ax)"/>
  <g clip-path="url(#axClip)">
    <rect class="ax-sweep" x="20" y="20" width="80" height="72" fill="url(#axShine)"/>
    <circle class="ax-glow" cx="60" cy="30" r="16" fill="url(#axTip)"/>
  </g>
</svg></div></body></html>
