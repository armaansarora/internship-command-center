<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .ks{width:min(60vmin,260px);height:min(60vmin,260px)}
  .glow{transform-origin:60px 66px;animation:breathe 9s ease-in-out infinite}
  .cap{animation:lift 9s ease-in-out infinite}

  @keyframes lift{0%,100%{opacity:.95}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.glow{animation:none;opacity:.5}.cap{animation:none;opacity:1}}
</style></head><body>
