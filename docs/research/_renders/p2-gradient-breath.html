<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Keystone — active breath</title><style>
html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
.keystone{width:200px;height:200px}
.keystone svg{width:100%;height:100%;display:block}
@keyframes kBreath{0%,100%{opacity:.30}50%{opacity:.92}}
@keyframes kRise{0%,100%{transform:translateY(5px) scaleY(.90)}50%{transform:translateY(-2px) scaleY(1.06)}}
.k-breath{animation:kBreath 8s ease-in-out infinite}
.k-rise{transform-box:fill-box;transform-origin:50% 100%;animation:kRise 8s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.k-breath{animation:none;opacity:.70}.k-rise{animation:none;transform:none}}
</style></head><body>
<div class="keystone">
<svg viewBox="0 0 120 120" role="img" aria-label="The Tower keystone, active" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="kg" x1="60" y1="92" x2="60" y2="52" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#F5F1E8"/><stop offset=".5" stop-color="#C9A84C"/><stop offset="1" stop-color="#E8C36B"/>
</linearGradient>
<clipPath id="kc"><path d="M60 58 Q68 58.4 69.4 70 Q70.4 81 70.6 92 L49.4 92 Q49.6 81 50.6 70 Q52 58.4 60 58 Z"/></clipPath>
</defs>
<rect width="120" height="120" rx="26" fill="#1A1A2E"/>
<g clip-path="url(#kc)"><g class="k-breath"><rect class="k-rise" x="49" y="56" width="22" height="42" fill="url(#kg)"/></g></g>

</svg>
</div></body></html>
