<!DOCTYPE html><html><head><meta charset="utf-8"><style>
html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
.k{width:min(60vmin,300px);height:min(60vmin,300px)}
@keyframes breathe{0%,100%{opacity:.42}50%{opacity:.92}}
@keyframes glow{0%,100%{opacity:.16}50%{opacity:.46}}
.soul{animation:breathe 8s ease-in-out infinite}
.halo{animation:glow 8s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){.soul{animation:none;opacity:.72}.halo{animation:none;opacity:.32}}
</style></head><body>
<svg class="k" viewBox="0 0 120 120" role="img" aria-label="The Keystone — light breathing through the passage">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D6B65B"/><stop offset="1" stop-color="#A9852F"/></linearGradient>
<radialGradient id="s" cx="50%" cy="100%" r="80%"><stop offset="0" stop-color="#FFF3CC"/><stop offset="1" stop-color="#FBE9A8" stop-opacity="0"/></radialGradient>
<filter id="e" x="-25%" y="-25%" width="150%" height="150%">
<feGaussianBlur in="SourceAlpha" stdDeviation="1.6" result="b"/>
<feOffset in="b" dx="1.4" dy="2" result="d"/><feOffset in="b" dx="-1.4" dy="-1.8" result="l"/>
<feFlood flood-color="#0B0B16" flood-opacity=".8" result="fd"/><feComposite in="fd" in2="d" operator="in" result="cd"/>
<feFlood flood-color="#F7ECC4" flood-opacity=".5" result="fl"/><feComposite in="fl" in2="l" operator="in" result="cl"/>
<feMerge><feMergeNode in="cd"/><feMergeNode in="cl"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect width="120" height="120" rx="26" fill="#1A1A2E"/>
<g filter="url(#e)"><path d="M38 84 Q36 84 36.6 81.4 L46.4 35 Q47 32 50 32 L70 32 Q73 32 73.6 35 L83.4 81.4 Q84 84 82 84 L70.5 84 Q70.5 70 60 70 Q49.5 70 49.5 84 Z" fill="url(#g)"/></g>
<path d="M49.5 84 Q49.5 70 60 70 Q70.5 70 70.5 84 Z" fill="#352A11"/>
<path class="halo" d="M49.5 84 Q49.5 70 60 70 Q70.5 70 70.5 84 Z" fill="url(#s)"/>
<path class="soul" d="M51 84 Q51 71.5 60 71.5 Q69 71.5 69 84 Z" fill="url(#s)"/>
</svg>
</body></html>
