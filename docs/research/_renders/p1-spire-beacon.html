<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#0e0e1a;display:grid;place-items:center}
  .wrap{width:240px;height:240px}
  @keyframes pulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  @keyframes rays{0%,100%{opacity:.28}50%{opacity:.62}}
  @keyframes glow{0%,100%{opacity:.18}50%{opacity:.5}}
  #core{transform-box:fill-box;transform-origin:60px 28px;animation:pulse 9s ease-in-out infinite}
  #ray{animation:rays 9s ease-in-out infinite}
  #halo{transform-box:fill-box;transform-origin:60px 30px;animation:glow 9s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#core,#ray,#halo{animation:none;opacity:.85}}
</style></head><body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" role="img" aria-label="The Beacon">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4B45A"/><stop offset="1" stop-color="#A98A38"/>
    </linearGradient>
    <radialGradient id="h" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F1DC92"/><stop offset="1" stop-color="#F1DC92" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="24" fill="#1A1A2E"/>
  <circle id="halo" cx="60" cy="30" r="16" fill="url(#h)"/>
  <g fill="url(#g)">
    <path fill-rule="evenodd" d="M37 98 L37 76 L46 76 L46 60 L52 60 L52 44 L68 44 L68 60 L74 60 L74 76 L83 76 L83 98 Z M52 98 L52 82 Q52 74 60 74 Q68 74 68 82 L68 98 Z"/>
    <path d="M54.5 44 L57 30 L63 30 L65.5 44 Z"/>
  </g>
  <g fill="#F1DC92">
    <path id="ray" d="M60 17 L61.7 26 L60 30 L58.3 26 Z M55 23 L60 26.5 L65 23 L60 30 Z" opacity=".5"/>
    <circle id="core" cx="60" cy="28" r="2.8"/>
  </g>
</svg>
</div></body></html>
