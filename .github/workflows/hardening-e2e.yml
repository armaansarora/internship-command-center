name: Hardening E2E

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  hardening-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: stub_publishable_key_for_e2e
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: stub_service_role_key_for_e2e
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright HARSH suite
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
