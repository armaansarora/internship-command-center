name: artlab-doc-drift
on:
  pull_request:
    paths:
      - "docs/artlab/CHARACTER-PIPELINE.md"
      - "docs/artlab/ENGINE.md"
      - "docs/artlab/sdk/canon/characters/**"
      - "src/lib/artlab/types.ts"
      - "scripts/artlab-doc-drift-check.ts"
  push:
    branches:
      - main
jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install deps
        run: npm ci
      - name: Run ArtLab doc-drift check
        run: npm run -s artlab-doc-drift-check
