partner_constraints:
  # ─── R11 pre-locked decisions (user, 2026-04-24) ───
  # Originally scoped in partner-brief as "R8.x cross-user matching" — promoted
  # to R11 as its own phase since R8 is already accepted (re-opening would trip
  # the Husky acceptance gate). Conceptually still "the R8.x work."
  - |
    (a) FULL SCOPE — not the slim version. Ship matching behind the 403
    hard-stop AND all 3 Red Team gaps (index populator cron, consent
    version check, audit log UI) AND both concerns (rate limit, delta
    re-scan on application/contact change). This is a privacy-touching
    feature; do it right once.
  - |
    (b) CONSENT GATE REUSE — R8 already shipped `assertConsented`
    (src/lib/networking/consent-guard.ts). R8.x EXTENDS it with version
    check; does NOT rebuild it. Add a CURRENT_CONSENT_VERSION constant
    and a typed 403 reason "consent-version-stale" for users whose
    stored version is below current. User then re-consents in Settings
    and the stored version bumps.
  - |
    (c) CRON REUSE — match-index populator lives at /api/cron/match-index/
    and follows the same shape as R7's /api/cron/briefing (per-user
    iteration, graceful-fail per user, budget cap). Do NOT rebuild cron
    infrastructure.
  - |
    (d) DELTA RE-SCAN SURFACE — on contact insert/update/warmth change
    AND on application insert/status change, enqueue a per-user re-scan.
    Reuse R8's existing event plumbing if present; otherwise a simple
    per-user debounce (no re-scan if one fired in the last 5 minutes for
    that user). No Kafka-style queueing.
  - |
    (e) ALGORITHM — heuristic, not ML. Score = edge strength (warmth) ×
    company overlap (does the counterparty work at a company the user
    has a recent application to?) × recency. Deterministic + cache-
    friendly. Seed fixture for tests.
  - |
    (f) AUDIT LOG — `match_events` table with anonymized counterparty_
    anon_key (hash of contact_id + salt, NOT the contact id). Settings →
    Networking → "How your data is used" surface showing last 20 events
    as human-readable one-liners ("You were matched with a contact at
    Acme on Apr 24"). NOT a raw log dump.
  # ─── R11 non-negotiables ───
  - |
    NO CROSS-USER LEAKS — RLS on every new table. Match algorithm reads
    FROM the current user's contacts but the MATCH TARGET (the company
    / counterparty surface) is always anonymized or aggregated. Never
    expose another user's raw contact record. Proof test must bind this
    invariant (two users, each with data, one user's query MUST NOT
    return the other user's row IDs).
  - |
    RATE LIMIT — 20 match-candidate queries per user per hour. Typed 429
    with retry_after_seconds. Documented in the consent copy surface
    (NOT hidden). Enforced server-side with Supabase-backed counter or
    Vercel Fluid Compute shared state.
  - |
    FAIL-CLOSED — every gate (consent, version, rate limit, RLS) fails
    closed. If any gate lookup throws or is indeterminate, return the
    403/429 not a 500. No fall-through to "return matches anyway"
    branches.
  - |
    CONSENT COPY — if the consent surface copy changes to cover R8.x
    matching, bump CURRENT_CONSENT_VERSION. All already-consented users
    become `consent-version-stale` until they re-consent. This is
    intentional — it's the mechanism for "users consented to X; now we
    do Y, get fresh consent." Partner-brief Red Team pass reviews the
    copy before ship.
  # ─── R11 scope ───
  - |
    SCOPE — R11.1 through R11.12 per ledger. Must-ship is 1-10; 11
    is partner Red Team pass (post-autopilot); 12 is the accept close.
  - |
    OUT OF SCOPE — (i) cross-user MESSAGING (just matching, not intros
    yet); (ii) reverse-matching where other users see you as a candidate
    (reverse needs its own consent opt-in); (iii) ML-based scoring;
    (iv) any §8 living expansions; (v) UI changes beyond the Settings →
    Networking audit surface.
  # ─── R11 anti-patterns (trip-wire against) ───
  - |
    ANTI-PATTERNS — do not ship: (i) a match algorithm that returns ANY
    raw contact data from another user's Rolodex; (ii) a 403-removal
    without also shipping index populator + audit log + rate limit;
    (iii) a "soft launch" flag that hides matching from UI while still
    computing+logging against users who haven't re-consented; (iv) a
    rate limit that's client-side only; (v) an audit log that's opaque
    ("match event fired" with no human-readable context).
