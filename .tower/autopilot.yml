  # ─── R12 pre-locked decisions (user, 2026-04-24) ───
  - |
    (a) HARNESS — Playwright. Rationale: best network-level primitives
    (route.fulfill for mocking fetch), parallel browser contexts for
    concurrency scenarios, retry-on-flake built in, real Chromium so
    frame-timing assertions are valid (closes R9 jsdom caveat). Do NOT
    add adjacent frameworks (Percy, Chromatic, Cypress, etc.).
  - |
    (b) NO PROD DB — scenarios run against mocked Supabase at the fetch
    layer (page.route() intercepts). NEVER write to the real Supabase
    project during a test run. If a scenario NEEDS real DB integration,
    flag for partner (me) to run via Supabase MCP after autopilot hands
    off — don't shortcut into prod from within a test session.
  - |
    (c) FIXTURES ARE DETERMINISTIC — seeded data with stable UUIDs, no
    Date.now() in fixtures. Scenarios must be re-runnable with identical
    outcomes. tests/e2e/fixtures/ holds canonical seed files.
  - |
    (d) CI INTEGRATION — GitHub Actions workflow at
    .github/workflows/hardening-e2e.yml. Runs on PRs that touch src/ +
    scheduled weekly run. Upload HTML reports as artifacts. Failure on
    main → merge block (add required-check to branch protection in a
    separate partner commit, not autopilot's job).
  # ─── R12 non-negotiables ───
  - |
    SCENARIO DESIGN — each HARSH scenario must have a clear invariant
    it binds (what the defender is protecting). Name the attack/failure
    mode, the victim, and the expected defense behavior in a
    test.describe block. No "runs without crashing" scenarios — those
    belong in unit tests.
  - |
    FAILURE HANDLING — if a scenario surfaces a real regression or a
    real defense gap, file it as a blocker via `tower block R12.X`. Do
    NOT weaken the assertion to make the test pass. Do NOT add a
    retry-until-green wrapper. The scenario IS the spec.
  - |
    R9 + R11 CARRYOVER CAVEATS — R12 closes these with real runtime
    proofs:
      • R9 Orrery 100+ planets frame timing (>= 30fps, click-to-detail
        < 250ms, supernova within ±10% of spec)
      • R11 cross-user RLS runtime: 2 authenticated users, user A's
        match-candidates response NEVER contains user B's data
      • R11 rate-limit end-to-end: 21 sequential real requests trip the
        Postgres RPC and return typed 429
      • R11 route-level fail-closed: mock DB error returns 500 not 200
  - |
    ISOLATION INVARIANT — scenarios must not mutate shared state. Each
    scenario runs in a fresh browser context with its own mock surface.
    No leaked localStorage, no shared cookies, no /tmp pollution
    between scenarios.
  - |
    TEST DB STRATEGY — if a scenario needs MORE than fetch-layer
    mocking (e.g., testing a real Postgres CHECK constraint), flag as
    a "needs-real-db" blocker; partner can spin up a Supabase branch
    via MCP for just those scenarios. Don't try to ship real-DB tests
    inside autopilot.
  # ─── R12 scope ───
  - |
    SCOPE MVP (must-ship) — R12.1 through R12.10 per ledger. 20+ HARSH
    scenarios across 5 categories (security, abuse, concurrency, scale,
    failure). R9 + R11 carryover caveats closed with runtime proofs.
  - |
    STRETCH (within phase, best-effort after MVP) — R12.11 CI
    integration workflow file. This can ship in R12 or ship as a
    partner follow-up commit after accept.
  - |
    OUT OF SCOPE — (i) mutation testing (Stryker, etc.); (ii) fuzzing
    (AFL/libFuzzer); (iii) load testing with >1000 concurrent users
    (Gatling/k6); (iv) ML-adversarial testing; (v) any §8 living
    expansions; (vi) replacing existing test suites — R12 ADDS the
    harness, does not migrate existing vitest tests.
  # ─── R12 anti-patterns (trip-wire against) ───
  - |
    ANTI-PATTERNS — do not ship: (i) scenarios that flake and get
    marked skip/todo; (ii) retry-until-green wrappers that hide race
    conditions; (iii) a harness that requires prod DB credentials to
    run; (iv) Playwright tests that don't actually open a browser
    context (using only request fixtures = vitest-with-extra-steps);
    (v) a CI workflow that runs on every push instead of gated on
    src/ changes (cost control); (vi) scenarios named after test IDs
    (SCENARIO-001) instead of descriptive intent ("user A cannot
    query user B's match candidates even with a crafted JWT").
