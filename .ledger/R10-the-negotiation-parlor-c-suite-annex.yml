decisions:
  - date: 2026-04-23
    text: Offers = new dedicated table (not extension of applications)
    why: Offer lifecycle diverges sharply — comp structure, deadline, negotiation
      surface. Colocating would bloat applications' hot path.
  - date: 2026-04-23
    text: company_comp_bands = global cache (not user-scoped)
    why: Comp bands are public data. User-scoping quadratic-ifies scrapes with no
      privacy benefit. Read-all-authenticated policy is safe.
  - date: 2026-04-23
    text: Three-chair convening is ephemeral (not persisted)
    why: Regenerating on demand is cheap and stays fresh; a convenings table would
      be more code for no user-facing value.
  - date: 2026-04-23
    text: /parlor is a standalone route, not an elevator floor
    why: Brief frames the Parlor as a C-Suite annex that materializes. Adding to the
      elevator breaks the metaphor.
  - date: 2026-04-23
    text: Firecrawl via direct HTTP (no npm dep)
    why: One fetch call — no need for a client library; avoids dep churn.
  - date: 2026-04-23
    text: CEO voice via browser speechSynthesis (no server TTS)
    why: Free, fast, private, good enough for reading drafts. Server TTS adds cost +
      latency for zero quality gain at this task.
  - date: 2026-04-23
    text: 24h negotiation hold clamped server-side by type (not free parameter)
    why: Non-bypassable is the partner intent. A free parameter is bypassable by
      hand-crafted request.
  - date: 2026-04-23
    text: CFO Parlor quip fires once, ever (tracked in preferences)
    why: Brief says 'make each visit memorable' — a quip on every visit becomes
      noise. Once is memorable; always is dull.
