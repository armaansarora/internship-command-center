completed: 2026-04-23T07:41:00.000Z
lock: null
acceptance:
  criteria:
    - "User can generate a tailored cover letter and resume for one application
      quickly. Refinement loop: user types feedback → new draft appears shortly.
      Three tone variants demonstrably different on same input. PDF export reads
      as publication-quality."
