        prompts per tone, not temperature variance"
      - "INVARIANT 3 (approval gate): /approve returns 400 no_tone_chosen
        when metadata.selectedCoverLetterId is null — two mandatory clicks
        separated in both code and UX"
      - "INVARIANT 4 (send-time gate): outreach-sender cron reads
        status='approved' only; pending_approval rows invisible to sender
        (source-inspection assertion prevents regression)"
      - "INVARIANT 5 (PDF export): cover letter + resume render as
        application/pdf with %PDF- header, Cache-Control private no-store"
