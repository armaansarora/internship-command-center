phase: R5
name: The Writing Room (Floor 5)
status: complete
intent: "A quiet floor. A single desk lamp. Paper drafts stacked. A typewriter
  on the side. A press in the corner. When the user drops a job description, CMO
  picks up a pen — you watch a cover letter compose itself in real time, as if
  the character is writing it. When CMO finishes, the paper slides out as a
  publication-quality preview. For resumes: a mechanical press stamps a new
  version out of the base resume, sections glowing as CMO rewrites bullets to
  match the JD."
