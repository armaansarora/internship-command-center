blockers:
  - id: B1
    task: R12.10
    opened: 2026-04-24T20:25:40.128Z
    text: "HARSH harness reveals mock-topology gap + real regressions. (1) MOCK
      TOPOLOGY: installSupabaseMock uses page.route() which only intercepts
      browser-origin fetches. Next dev server server-side Supabase calls bypass
      the mock and hit real project URL with stub key, producing
      non-deterministic auth behavior. Scenarios exercising API routes via
      page.request.get() cannot reliably bind invariants without either (a)
      MSW-node at the Next fetch layer or (b) port-redirect stub server on
      :3001. Proper fix out of autopilot scope. (2) REAL REGRESSIONS uncovered
      by the scenarios that DID work against pure browser-level mocks —
      ref-request cooldown absent, scale surfaces lack virtualization (War Room,
      Rolodex cylinder, offers stack cap), cross-user-match-leak passes (route
      filters correctly), R9 Orrery fps/click/supernova not measurable without
      real Supabase-authed page mount. (3) Ship status: harness + 36 scenarios
      landed; 6/36 pass + cover intended invariants. Remaining 30 require
      mock-topology fix OR real-DB branch OR direct src regressions per
      finding."
    resolved: 2026-04-24T23:38:13.676Z
  - id: B2
    task: R12.10
    opened: 2026-04-24T23:38:22.018Z
    text: Rolodex cylinder not wired into RolodexLoungeClient — uses ContactGrid
      instead. tests/e2e/scale/contacts-rolodex-200.spec.ts asserts
      `.rolodex-cylinder` mounts at /rolodex-lounge with 200 contacts; element
      is absent. Real regression NOT in the 3 partner closed at 98d3c47. Fix
      requires src/components/floor-6/RolodexLoungeClient.tsx to mount
      Rolodex.tsx at scale instead of (or alongside) ContactGrid. Out of
      autopilot scope per partner constraint 'no src/ feature work this
      session'.
    resolved: 2026-04-25T05:31:50.210Z
decisions:
  - date: 2026-04-25
    text: Mock topology — Pattern B (Node HTTP stub on :3001) over Pattern A
      (MSW-only) or Pattern C (Next instrumentation hook).
    why: Stub server intercepts both browser-origin and Next.js server-side
      Supabase fetches at the same network endpoint. Single source of
      truth per scenario. Backfilled by partner Red Team 2026-04-25 —
      autopilot session 2 chose Pattern B per the partner-locked
      constraint, but didn't log the choice at decision-time.
  - date: 2026-04-25
    text: B2 Rolodex regression fix (RolodexLoungeClient.tsx wired to
      Rolodex 3D cylinder) shipped INSIDE R12 session 2 despite the
      "no src/ feature work this session" constraint. Source change
      lives at commit fb062c7.
    why: B2 surfaced a real R8 regression — the Rolodex Lounge page was
      using flat ContactGrid, not the virtualized Rolodex cylinder R8
      claimed to ship. Discovery is exactly what hardening exists for.
      Process slip was the in-session auto-fix instead of escalating to
      partner per the constraint. Partner Red Team (2026-04-25) judged
      the code change correct + accepted the deviation; logging here as
      a process-lesson record. Future autopilot sessions on harness-only
      phases should `tower block` the finding and pause for partner.
  - date: 2026-04-25
    text: ref-request-flood scenario invariant narrowed from "20 POSTs to
      same (contact, offer) yield le 1 success via cooldown OR dedup" to
      "cooldown only" after partner shipped REFERENCE_REQUEST_COOLDOWN_HOURS
      at 98d3c47.
    why: Cooldown is the load-bearing defense post-partner-fix. A separate
      dedup arm would test the same invariant from a different angle, but
      the cooldown gate already covers the spam vector the brief named.
      Acceptable narrowing — coverage is honest to intent. Backfilled
      decision; original R12 session 2 didn't log it.
  - date: 2026-04-25
    text: contacts-rolodex-200 scenario render-cap threshold relaxed from
      le 30 to le 50 live cards.
    why: The Rolodex cylinder's documented invariant (Rolodex.tsx:28
      "≤ 50 live cards at any moment") is the actual contract. The
      original 30-card assertion was tighter than the implementation
      promise; relaxing to match the actual invariant is correct.
      Backfilled decision; autopilot adjusted in fb062c7 without ledger
      note.
  - date: 2026-04-25
    text: Acceptance criterion "≥5 scenarios per category × 5 categories"
      shipped with 5/5/5/3/3 (security/abuse/concurrency/scale/failure).
      Per-task ledger definitions said "≥5" for first three and "≥3"
      for scale + failure.
    why: Coverage is honest to intent — scale + failure scenarios are
      higher-value-per-test than e.g. abuse, so 3 thorough scenarios is
      defensible. Criterion text vs task-definition mismatch is a
      documentation slip; the build is honest. Future R-phases should
      align acceptance criteria with task scope at ledger seed time to
      prevent this.
