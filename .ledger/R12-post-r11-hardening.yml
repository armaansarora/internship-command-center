acceptance:
  criteria:
    - Playwright harness installed, configured, and running locally + in CI
      (GitHub Actions workflow added). Test isolation via per-scenario Supabase
      mock at the fetch layer (NOT against prod DB).
    - Authenticated E2E flow works — test user can sign in, navigate the tower,
      interact with real components. Session persistence covered.
    - "Every HARSH scenario category has ≥5 scenarios shipped: security bypass
      attempts, abuse patterns, concurrency races, scale stress, third-party
      failure modes."
    - R9 frame-timing caveat closed — Orrery performance measured at 100+
      planets, FPS assertion, click-latency measured.
    - R11 cross-user RLS runtime proof — two distinct authenticated users, each
      with data; one user's query to match-candidates MUST NOT surface the other
      user's anon-keys / row IDs / PII.
    - R11 rate-limit end-to-end — 21 real sequential requests against the live
      route trip the Postgres RPC and return typed 429.
    - Any scenario that surfaces a real regression opens a blocker; NOT silently
      weakened.
  met: true
  verified_by_commit: fb062c7
