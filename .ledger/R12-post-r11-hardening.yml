phase: R12
name: Post-R11 Hardening (HARSH E2E)
status: in_progress
intent: Stand up a real browser-based E2E harness (Playwright) and run HARSH
  scenarios against the full R0-R11 surface. Closes accumulated proof-test debt
  that jsdom couldn't bind (R9 frame timing, R11 cross-user RLS runtime proof,
  R11 rate-limit end-to-end) AND hardens the build against realistic adversarial
  inputs (security bypasses, abuse patterns, concurrency races, scale
  breakdowns, third-party failures). Must-ship is 20+ scenarios across five
  categories — NOT a test-count target but a coverage target against known drift
  surfaces. Accept when every scenario passes + all R9/R11 carryover caveats are
  runtime-bound + full suite green.
