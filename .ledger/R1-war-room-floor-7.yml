      Dragging a card between stages passes a three-person vibe test against
      Linear's issue drag. The proof-of-concept loop executes end-to-end in a
      user's first session. Whiteboard content visibly reflects `agent_memory`
      writes. Empty state invites. Lighthouse >90 on the War Room route.
  met: false
  verified_by_commit: null
