phase: R1
name: War Room (Floor 7)
status: in_progress
intent: A tactical console carved from mahogany. The CRO is on the floor when
  the user arrives. Jobs *arrive* (not appear). Applications move through stages
  with visible consequence — every status change feels like an operation, not a
  form submit. By the end of a user's first session on this floor, they've
  watched one opportunity get discovered, one resume get tailored, one cover
  letter get drafted, one outreach get queued for approval, and one email
  actually send after they approve. The North Star is real on Floor 7 first,
  then everywhere else.
