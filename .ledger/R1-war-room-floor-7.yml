blockers: []
decisions:
  - date: 2026-04-22
    text: Greenhouse + Lever public APIs as primary sources; JSearch only if env
      present
    why: Ships without paywalled deps; no escalation for missing secret
  - date: 2026-04-22
    text: Hybrid worker cadence (Vercel Cron 4h + on-demand CRO tool)
    why: Brief "I don't know yet" — fixed + on-demand covers both cold user and
      ongoing
  - date: 2026-04-22
    text: Match-score stored on applications.matchScore (not computed on read)
    why: Enables war-table sort-by-score and whiteboard ranking without extra vector
      work
  - date: 2026-04-22
    text: Match-score visual = glow ribbon (not sound, not color chip)
    why: Colored chips are anti-pattern per brief; glow fits Bloomberg/mahogany
  - date: 2026-04-22
    text: CRO intake is conversational (4 questions), persists to agent_memory
    why: Brief anchor "visible on a legal pad" — conversation is the intake
  - date: 2026-04-22
    text: CEO dispatch is sequential for R1; parallelism deferred to R3
    why: Keeps scope to Floor 7; R3's North Star concerns orchestration, not content
