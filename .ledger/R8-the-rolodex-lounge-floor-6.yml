decisions:
  - date: "2026-04-23"
    text: "Cross-user match BEHAVIOR deferred to R8.x post Red Team pass; consent
      infrastructure + endpoint ships in R8 returning 403 always"
    why: "Partner constraint — if consent surface can't be finished cleanly, ship
      rolodex-only and open a blocker for cross-user matching. R8 ships the
      infrastructure so no code is built twice, and the endpoint hard-codes 403
      so cross-user data cannot accidentally leak before Red Team."
  - date: "2026-04-23"
    text: "CSS 3D + GSAP over R3F for the rolodex"
    why: "200 cards + spring rotation hits 60fps on CSS 3D with virtualization, and
      bundle cost is a fraction. R3F is right when we add lighting/shadows; R8 is
      flat cards on a cylinder."
  - date: "2026-04-23"
    text: "Cool-blue palette for cold/cooling — no red anywhere"
    why: "Partner non-negotiable — warmth decay is informative not punitive. Cold
      cards look like old photographs, not alerts. Current grid uses #EF4444 (red)
      on cold — this is the R8.4 recolor target."
  - date: "2026-04-23"
    text: "Linear warmth formula — max(0, 100 - days*2). 50 days = 0"
    why: "Simple, auditable, fits grep invariant. Can be replaced with a smoother
      curve in R8.x after usage data if it feels wrong."
  - date: "2026-04-23"
    text: "Private note never AI-visible, never exported, never cross-user"
    why: "The sharpening detail from the Brief ('the thing a user puts on a card
      that only they see'). Allowlist grep in P5 is the mechanical guard — every
      future reference must be consciously added to the allowlist."
