intent: The CEO is *already at the window* when the user arrives in the morning.
  Gold-hour skyline. A briefing is unfolding on glass. This isn't a dashboard
  with a greeting — it's the first minute of a scripted workday. When the user
  opens the app in the morning, they don't see numbers first — they see the CEO
  turning from the window.
