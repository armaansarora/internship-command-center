decisions:
  - date: 2026-04-22
    text: "Penthouse rebuild: page.tsx KEEP, penthouse-client.tsx REPLACE,
      penthouse-data.ts REFACTOR, ActivityFeed/GlassPanel/PipelineNodes/StatCard
      KEEP (demoted), QuickActionCard REFACTOR, cron/briefing route
      REFACTOR-MAJOR, ProceduralSkyline minor prop add"
    why: Current Penthouse is the exact anti-pattern brief bans (greeting banner,
      4-KPI grid, Phase-badged disabled buttons). Shared primitives survive;
      layout and affordances rebuild.
  - date: 2026-04-22
    text: Scene Mix approach (Option D) — CEO turns from window, first beat on
      glass, Space advances, Esc reveals rest
    why: Matches Severance/Mad-Men cold-open anchor; honors skippable
      non-negotiable; passive user still flows via 8s idle auto-advance.
  - date: 2026-04-22
    text: Pre-compute in cron with soft-invalidation; no event-driven invalidation
      for R2 (YAGNI)
    why: Brief says pre-compute to avoid 'give me a moment'; 18h staleness threshold
      + client fallback covers edge cases.
  - date: 2026-04-22
    text: Voice layer DEFERRED entirely from R2
    why: Brief's 'I don't know yet' marks this open. Non-negotiable 'never auto-play
      without opt-in' needs UI scaffold that's out-of-scope; beats[] structure
      keeps future hook clean.
  - date: 2026-04-22
    text: Briefing storage reuses notifications table with [briefing_v2] JSON prefix
      on body; decode has legacy fallback
    why: Brief says 'persist to notifications'. Prefix lets decoder be forgiving.
      New table deferred until structure proves permanent.
  - date: 2026-04-22
    text: "Quick Actions: 1 fully wired (Add Application → /war-room?new=1), 3 wired
      to agent endpoints with placeholder responses and real pneumatic-tube
      animation"
    why: Full CIO/CPO/CMO dispatch execution overlaps R3 C-Suite orchestrator work.
      For R2 we ship the interaction contract + visual metaphor, which is the
      provocation the brief lists.
  - date: 2026-04-22
    text: "Autopilot execution model: inline/executing-plans for dependent spine;
      subagents only if context pressure hits 50% after R2.5"
    why: UI work with shared primitives; fresh subagents would need to re-learn
      Tower conventions. Matches R1 precedent — stayed inline, shipped 12/12.
