phase: R11
name: Cross-user warm-intro matching
status: complete
intent: Unblock the /api/networking/match-candidates 403 hard-stop with
  production-ready cross-user matching. Ships the full Red Team checklist — no
  half-shipping privacy-touching features. Matching surfaces Rolodex-edge
  warm-intros (Armaan → Sarah → Acme = surface Acme to Armaan) gated behind R8's
  consent + consent-version + audit-log + rate-limit + delta-re-scan invariants.
  Replaces the R8-era 403 holding pattern with the real thing.
started: 2026-04-24T16:51:26.171Z
completed: 2026-04-24T19:12:05.995Z
lock:
  holder: sess-a5908e
  acquired: 2026-04-24T19:11:17.419Z
  expires: 2026-04-24T21:11:17.414Z
acceptance:
  criteria:
    - /api/networking/match-candidates returns 200 with real match candidates
      for consented users whose consent_version matches the current platform
      version; otherwise returns a well-typed 4xx (401 unauthenticated, 403
      consent-required, 403 consent-version-stale, 429 rate-limited).
    - Index populator cron backfills the match index from contacts +
      applications on a nightly schedule AND on-demand when a delta trigger
      fires (new contact, new application, updated warmth).
    - Audit log surface in Settings → Networking lets users see every match
      event involving their data, with timestamp and anonymized counterparty
      key. Readable, not a dev-tools dump.
    - Rate limit — 20 match-candidate queries per user per hour, enforced
      server-side with typed 429. Documented in the consent copy.
    - Proof test binds each invariant (consent gate, version gate, rate limit,
      audit log insert, RLS cross-user isolation).
  met: true
  verified_by_commit: 6b9be81
tasks:
