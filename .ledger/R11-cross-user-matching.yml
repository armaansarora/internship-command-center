    started: 2026-04-24T17:09:40.266Z
    completed: 2026-04-24T17:12:38.427Z
    commit: bb164e6
  R11.5:
    title: Match algorithm — the core scoring. Inputs the user's contacts +
      applications; outputs ranked candidates. Heuristic, not ML. Must be
      deterministic and cache-friendly.
    status: complete
    started: 2026-04-24T16:59:26.055Z
    completed: 2026-04-24T17:02:24.984Z
    commit: 7383e7a
