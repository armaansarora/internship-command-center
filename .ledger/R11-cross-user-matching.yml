      migrate existing consented users to version 1; introduce
      CURRENT_CONSENT_VERSION constant the guard reads. Migration 0022 additive.
    status: complete
    started: 2026-04-24T16:51:26.171Z
    completed: 2026-04-24T16:55:45.663Z
    commit: ec80089
  R11.2:
    title: Match-candidate index schema — new match_candidate_index table (user_id,
      counterparty_anon_key, edge_strength, inserted_at, invalidates_at) with
      RLS so users see only their own index rows. Migration 0022 or 0023.
    status: complete
    started: 2026-04-24T16:55:50.520Z
    completed: 2026-04-24T16:59:25.738Z
    commit: cdf979a
  R11.3:
    title: Index populator cron — /api/cron/match-index nightly cron that rebuilds
