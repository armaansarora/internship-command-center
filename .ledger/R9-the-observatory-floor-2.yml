intent: The contemplation floor. Panoramic, cool-blue, quiet. The centerpiece is
  the **Orrery** — the user's pipeline as celestial bodies in orbit. Tier-1
  companies are inner planets; Tier-4 outer. Status changes flash;
  interview-scheduled spawns satellites; offers explode into supernovae;
  rejections fade. CFO stands at a panoramic window; a conversion funnel
  projects onto the glass. A rejection autopsy lives here — pattern analysis
  across rejections.
