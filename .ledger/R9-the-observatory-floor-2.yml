decisions:
  - date: 2026-04-23
    text: CSS 3D with decoupled render/data layers (partner constraint).
      OrreryRender.tsx is the ONLY file touching CSS 3D transforms; data layer
      (OrreryPlanet[] interface + transformer) is pure and independently
      testable.
    why: R3F upgrade later is a single-file swap, not a rewrite of callers.
  - date: 2026-04-23
    text: Perf gate uses architectural-invariant test (single GSAP timeline, CSS
      contain on planet, will-change scoped to orbit groups) instead of JSDOM
      frame-time measurement.
    why: JSDOM cannot measure real frame times; virtualization (±60° front arc) is
      the fallback if invariants prove insufficient.
  - date: 2026-04-23
    text: Rejection autopsy is opt-in via Settings toggle (default ON, exact partner
      copy). Three chips + optional free text on application card inline; Skip
      default; Save once chip selected. NEVER a modal.
    why: Partner constraint D — must be ultra-low-friction; modal would feel
      punitive.
  - date: 2026-04-23
    text: CFO threshold trigger reuses R8 warmth-decay cron architecture and R7
      pneumatic-tube delivery. Mondays 09:00 UTC. Idempotent per ISO week via
      source_entity_id bucket.
    why: Partner constraint E — do not redesign delivery; reuse existing infra.
  - date: 2026-04-23
    text: State of the Month reuses @react-pdf/renderer (R5.7 dep). Inline SVG
      primitives for orrery snapshot, no rasterization.
    why: Partner constraint F — do NOT pick a second PDF library.
