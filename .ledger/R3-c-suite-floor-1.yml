intent: The brain of the building. When the user rings the bell, the camera
  pulls back and the chain of command lights up live — all seven departments,
  subagents branching under them, edges flowing with dispatch. The user is not
  chatting with a chatbot; they are watching a boardroom run. When the CEO is
  between sessions, they're at their desk — maybe glancing at a photo frame,
  maybe reading, maybe waiting.
