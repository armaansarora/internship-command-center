decisions:
  - date: "2026-04-22"
    text: "Polling at 300ms instead of Supabase realtime for dispatch progress"
    why: "Avoids realtime channel setup overhead for a 3-second orchestration window;
      polling stops cleanly once all dispatches terminal. Realtime can layer
      on later if scale demands."
  - date: "2026-04-22"
    text: "2D brushed-gold SVG bell retained — no R3F / WebGL bell"
    why: "The boardroom-runs metaphor is carried by the Dispatch Graph animation
      + building dim, not by a 3D bell. Saves R3 scope for later milestones if
      it ever becomes a bottleneck."
  - date: "2026-04-22"
    text: "Fixed radial layout for 7 nodes — no d3-force"
    why: "Force-directed at n=7 risks main-thread jank; fixed layout + SMIL
      animateMotion streaks deliver the 'watch it work' feel at zero JS
      per-frame cost."
  - date: "2026-04-22"
    text: "CEO voice (TTS/STT) deferred to R4"
    why: "Same reason as R2 — opt-in / permissions / audio-pipeline scope is its
      own initiative. R3 was already 12 tasks."
  - date: "2026-04-22"
    text: "depends_on uuid[] populated but not exercised in R3"
    why: "Column ships as a real schema deliverable (default '{}'). All R3
      dispatches use depends_on=[]. Future milestones can add 2-level dispatch
      without another migration."
  - date: "2026-04-22"
    text: "CIO→CRO bridge only in R3 for shared-knowledge"
    why: "One producer + one consumer is enough to prove the Proof line about
      cross-agent learning. Other agents wire in during later milestones."
  - date: "2026-04-22"
    text: "registerInject callback over forwardRef for /-injection"
    why: "Simpler — no forwardRef dance, doesn't change CEODialoguePanel default
      export. Parent owns the function ref; panel registers on mount."
  - date: "2026-04-22"
    text: "Pure helpers extracted (computeBuildingDim, parseInjectKey,
      shouldOpenInjectOnSlash, mergeGraphDispatches, extractBatchRequestId,
      tickDispatchProgress) for deterministic testing without
      @testing-library/react"
    why: "@testing-library/react is not installed; using happy-dom +
      renderToStaticMarkup means full hook lifecycle tests are awkward.
      Pure helpers carry the logic — React-bound shells stay thin."
